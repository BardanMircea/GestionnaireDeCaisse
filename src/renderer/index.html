<h1>Gestion du Catalogue 📦</h1>
<p>Statut BDD : <span id="db-status">...</span></p>
<hr />

<div style="display: flex; gap: 40px">
  <div style="flex: 1; background: #eee; padding: 20px; border-radius: 8px">
    <h3>Ajouter un produit</h3>

    <label>Code-barres (Recherche OpenFoodFacts) :</label><br />
    <input
      type="text"
      id="prod-barcode"
      placeholder="Scanner ou taper le code"
    />
    <button id="btn-search-off">Rechercher API</button>
    <span
      id="api-feedback"
      style="font-size: 12px; display: block; margin-top: 5px"
    ></span>

    <br /><br />
    <label>Nom du produit * :</label><br />
    <input type="text" id="prod-name" required /><br /><br />

    <label>Marque :</label><br />
    <input type="text" id="prod-brand" /><br /><br />

    <label>Prix de vente (€) * :</label><br />
    <input type="number" id="prod-price" step="0.01" required /><br /><br />

    <label>TVA (%) :</label><br />
    <select id="prod-tva">
      <option value="5.5">5.5% (Alimentation générale)</option>
      <option value="20">20% (Standard)</option></select
    ><br /><br />

    <input type="hidden" id="prod-image" />

    <button
      id="btn-save-product"
      style="background: green; color: white; padding: 10px"
    >
      Enregistrer le produit
    </button>
  </div>

  <div style="flex: 1">
    <h3>Produits en Catalogue</h3>
    <ul id="products-list"></ul>
  </div>
</div>

<script src="renderer.js"></script>
